{% extends "base.html" %}
{% block title %}Transactions — Spectra{% endblock %}

{% block content %}
<h1 class="page-title">Transactions</h1>
<p class="page-subtitle" id="txSubtitle">Click a category or merchant to edit it</p>

<div class="table-container">
    <div class="table-toolbar">
        <input type="text" id="searchInput" placeholder="Search merchants..." style="flex:1; max-width: 260px;">
        <select id="categoryFilter">
            <option value="">Alle categorieen</option>
        </select>
        <input type="date" id="dateFrom" title="From date">
        <input type="date" id="dateTo" title="To date">
        <button class="btn btn-secondary btn-sm" id="uncatToggleBtn" type="button" onclick="toggleUncategorizedQueue()">Inbox zero: OFF</button>
    </div>

    <div class="uncategorized-queue" id="uncatQueue" style="display:none;">
        <div class="uncat-queue-info" id="uncatQueueInfo">Ongecategoriseerde wachtrij</div>
        <div class="uncat-queue-actions">
            <button class="btn btn-secondary btn-sm" type="button" id="selectAllVisibleBtn" onclick="toggleSelectAllVisible()">Select all visible</button>
            <select id="bulkCategorySelect" class="settings-select">
                <option value="">Choose category…</option>
            </select>
            <button class="btn btn-primary btn-sm" type="button" onclick="applyBulkCategory()">Apply to selected</button>
        </div>
    </div>

    <div id="tableBody">
        <div class="empty-state">
            <div class="icon">📋</div>
            <h3>Loading...</h3>
        </div>
    </div>

    <div class="pagination" id="pagination"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let categories = [];
    let uncategorizedOnly = false;

    function apiErrorMessage(payload, fallback) {
        return window.SpectraApi?.errorMessage(payload, fallback) || fallback;
    }

    function themeVar(name, fallback = '') {
        return window.SpectraTheme?.getCssVar(name, fallback) || fallback;
    }

    function escapeHtml(value) {
        const text = String(value ?? '');
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;',
        };
        return text.replace(/[&<>"']/g, char => map[char] || char);
    }

    function categoryOptionsHtml(selected = '') {
        return categories.map(cat => {
            const isSelected = cat === selected ? 'selected' : '';
            const label = window.SpectraCategory?.translate(cat) || cat;
            return `<option value="${cat}" ${isSelected}>${label}</option>`;
        }).join('');
    }

    function splitBookingDateTime(value) {
        const raw = String(value || '').trim();
        const match = raw.match(/^(\d{4}-\d{2}-\d{2})(?:[T\s](\d{2}:\d{2})(?::\d{2})?)?/);
        if (match) {
            return { date: match[1], time: match[2] || '' };
        }
        return { date: raw, time: '' };
    }

    function formatBookingDateCell(tx) {
        const { date, time } = splitBookingDateTime(tx.date);
        const dateLabel = date ? formatSpectraDate(date, { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
        const timeLabel = String(tx.booking_time || time || '').trim() || '—:—';
        return `
            <div class="tx-booking">
                <span class="tx-booking-date">${dateLabel}</span>
                <span class="tx-booking-time">${timeLabel}</span>
            </div>
        `;
    }

    function detailRowId(txId) {
        const safe = String(txId || '').replace(/[^a-zA-Z0-9_-]/g, '_');
        return `tx-detail-${safe}`;
    }

    function normalizeMetaKey(value) {
        return String(value || '')
            .toLowerCase()
            .replace(/\s+/g, ' ')
            .trim();
    }

    function toDisplayMetaDate(value) {
        const raw = String(value || '').trim();
        if (!raw) {
            return '';
        }
        if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
            return formatSpectraDate(raw, { day: '2-digit', month: 'short', year: 'numeric' });
        }
        return raw;
    }

    function detailRowsFromTx(tx) {
        const details = tx.details || {};
        const primaryRows = [];
        const extraRows = [];
        const consumedKeys = new Set();
        const remember = (...keys) => {
            keys.forEach(key => {
                const normalized = normalizeMetaKey(key);
                if (normalized) {
                    consumedKeys.add(normalized);
                }
            });
        };
        const pushPrimary = (label, value, keyAliases = []) => {
            if (value === null || value === undefined) return;
            const text = String(value).trim();
            if (!text) return;
            primaryRows.push({ label, value: text });
            remember(label, ...keyAliases);
        };

        pushPrimary('Boekingstijd', details.booking_time || tx.booking_time, ['Datum/Tijd']);
        pushPrimary('Valutadatum', toDisplayMetaDate(details.value_date), ['Value Date']);
        pushPrimary('Betaalmethode', details.payment_method, ['Payment Method']);
        pushPrimary('Tegenpartij', details.counterparty, ['Naam', 'Overige partij']);
        pushPrimary('Rekening', details.account);
        pushPrimary('Tegenrekening', details.counter_account, ['IBAN']);
        pushPrimary('Kenmerk', details.reference, ['Betalingskenmerk', 'Machtigingskenmerk']);
        pushPrimary('Code', details.transaction_code);
        pushPrimary('Mutatiesoort', details.mutation_type, ['Transactie']);
        pushPrimary('Mededelingen', details.message);
        pushPrimary('Tag', details.tag);
        pushPrimary('BIC', details.bic);
        pushPrimary('Saldo na mutatie', details.running_balance);

        const ibans = Array.isArray(details.iban_candidates) ? details.iban_candidates.filter(Boolean).slice(0, 3) : [];
        if (ibans.length && !consumedKeys.has('iban')) {
            pushPrimary('IBAN(s)', ibans.join(', '), ['IBAN']);
        }

        const structured = details.structured_fields && typeof details.structured_fields === 'object'
            ? details.structured_fields
            : {};
        Object.entries(structured).forEach(([key, value]) => {
            const normalizedKey = normalizeMetaKey(key);
            if (consumedKeys.has(normalizedKey)) {
                return;
            }
            if (value === null || value === undefined) {
                return;
            }
            const text = String(value).trim();
            if (!text) {
                return;
            }
            extraRows.push({ label: key, value: text });
        });

        return { primaryRows, extraRows };
    }

    function renderTxDetailsPanel(tx) {
        const { primaryRows, extraRows } = detailRowsFromTx(tx);
        const description = String(tx.details?.original_description || '').trim();

        if (!primaryRows.length && !extraRows.length && !description) {
            return `<div class="tx-details-empty">Geen extra metadata beschikbaar voor deze boeking.</div>`;
        }

        const rowsHtml = primaryRows.map(item => `
            <div class="tx-detail-item">
                <span class="tx-detail-label">${escapeHtml(item.label)}</span>
                <span class="tx-detail-value">${escapeHtml(item.value)}</span>
            </div>
        `).join('');

        const moreHtml = extraRows.length
            ? `
                <details class="tx-details-more">
                    <summary>Meer metadata (${extraRows.length})</summary>
                    <div class="tx-details-grid tx-details-grid-more">
                        ${extraRows.map(item => `
                            <div class="tx-detail-item">
                                <span class="tx-detail-label">${escapeHtml(item.label)}</span>
                                <span class="tx-detail-value">${escapeHtml(item.value)}</span>
                            </div>
                        `).join('')}
                    </div>
                </details>
            `
            : '';

        const rawHtml = description
            ? `<div class="tx-detail-raw"><span class="tx-detail-label">Ruwe omschrijving</span><span class="tx-detail-value">${escapeHtml(description)}</span></div>`
            : '';

        return `
            <div class="tx-details-panel">
                <div class="tx-details-grid">
                    ${rowsHtml}
                </div>
                ${moreHtml}
                ${rawHtml}
            </div>
        `;
    }

    function toggleTxDetails(event, rowEl) {
        const interactiveTarget = event.target.closest('input, select, button, .editable, .badge, .quick-category-wrap, label, a');
        if (interactiveTarget) {
            return;
        }

        const detailId = rowEl?.dataset?.detailId;
        if (!detailId) {
            return;
        }
        const detailRow = document.getElementById(detailId);
        if (!detailRow) {
            return;
        }

        const isOpen = rowEl.classList.contains('expanded');
        rowEl.classList.toggle('expanded', !isOpen);
        detailRow.hidden = isOpen;
    }

    async function loadCategories() {
        const res = await fetch('/api/categories');
        const data = await res.json();
        categories = data.categories;

        const select = document.getElementById('categoryFilter');
        const allCategoriesLabel = (window.SpectraI18n?.getLanguage() || 'en') === 'nl'
            ? 'Alle categorieen'
            : 'All categories';
        select.innerHTML = `<option value="">${allCategoriesLabel}</option>`;
        categories.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = window.SpectraCategory?.translate(c) || c;
            select.appendChild(opt);
        });

        const bulkSelect = document.getElementById('bulkCategorySelect');
        const chooseLabel = (window.SpectraI18n?.getLanguage() || 'en') === 'nl'
            ? 'Kies categorie...'
            : 'Choose category...';
        bulkSelect.innerHTML = `<option value="">${chooseLabel}</option>` + categoryOptionsHtml();
    }

    async function loadTransactions(page = 1) {
        currentPage = page;
        const search = document.getElementById('searchInput').value;
        const category = document.getElementById('categoryFilter').value;
        const dateFrom = document.getElementById('dateFrom').value;
        const dateTo = document.getElementById('dateTo').value;

        const params = new URLSearchParams({ page, per_page: 50 });
        if (search) params.set('search', search);
        if (category && !uncategorizedOnly) params.set('category', category);
        if (dateFrom) params.set('date_from', dateFrom);
        if (dateTo) params.set('date_to', dateTo);
        if (uncategorizedOnly) params.set('uncategorized_only', 'true');

        const res = await fetch(`/api/transactions?${params}`);
        const data = await res.json();

        renderTable(data.transactions);
        renderPagination(data.page, data.pages);

        const subtitle = document.getElementById('txSubtitle');
        subtitle.textContent = uncategorizedOnly
            ? `Inbox zero modus — ${data.total} ongecategoriseerde transactie(s)`
            : 'Click a category or merchant to edit it';

        const queue = document.getElementById('uncatQueue');
        const queueInfo = document.getElementById('uncatQueueInfo');
        queue.style.display = uncategorizedOnly ? 'flex' : 'none';
        if (uncategorizedOnly) {
            queueInfo.textContent = `${data.total} ongecategoriseerde in deze selectie`;
        }
    }

    function renderTable(txns) {
        const container = document.getElementById('tableBody');

        if (txns.length === 0) {
            container.innerHTML = `
            <div class="empty-state">
                <div class="icon">📋</div>
                <h3>No transactions found</h3>
                <p>Upload transactions to get started</p>
            </div>`;
            return;
        }

        let html = `<table>
        <thead><tr>
            <th style="width:40px">✓</th>
            <th>Date</th>
            <th>Merchant</th>
            <th>Category</th>
            <th style="text-align:right">Amount</th>
        </tr></thead><tbody>`;

        for (const t of txns) {
            const isExpense = t.amount < 0;
            const amountClass = isExpense ? 'expense' : 'income';
            const isUncategorized = t.category === 'Uncategorized';
            const badgeClass = isUncategorized ? 'badge badge-uncategorized' : 'badge';
            const detailId = detailRowId(t.id);
            const dotColor = isUncategorized ? '' : `background:${getCategoryColor(t.category)}`;
            const checkbox = isUncategorized
                ? `<input type="checkbox" class="uncategorized-check" value="${t.id}" aria-label="Select transaction">`
                : '';
            const quickCategorySelect = isUncategorized
                ? `<div class="quick-category-wrap">
                    <select class="quick-category-select" onchange="applyQuickCategory('${t.id}', this)">
                        <option value="">Toewijzen…</option>
                        ${categoryOptionsHtml()}
                    </select>
                </div>`
                : '';

            html += `<tr class="tx-main-row" data-detail-id="${detailId}" onclick="toggleTxDetails(event, this)">
            <td>${checkbox}</td>
            <td>${formatBookingDateCell(t)}</td>
            <td>
                <span class="editable" onclick="editField(this, '${t.id}', 'merchant')">${t.merchant}</span>
            </td>
            <td>
                <span class="${badgeClass}" data-category="${t.category}" onclick="editField(this, '${t.id}', 'category')">
                    <span class="badge-dot" style="${dotColor}"></span>
                    ${window.SpectraCategory?.translate(t.category) || t.category}
                </span>
                ${quickCategorySelect}
            </td>
            <td class="amount ${amountClass}" style="text-align:right">${formatCurrency(t.amount)}</td>
        </tr>`;
            html += `
                <tr class="tx-detail-row" id="${detailId}" hidden>
                    <td colspan="5">${renderTxDetailsPanel(t)}</td>
                </tr>
            `;
        }

        html += '</tbody></table>';
        container.innerHTML = html;
        container.querySelectorAll('.uncategorized-check').forEach(check => {
            check.addEventListener('change', updateSelectAllButtonState);
        });
        updateSelectAllButtonState();
    }

    function renderPagination(page, total) {
        const container = document.getElementById('pagination');
        if (total <= 1) { container.innerHTML = ''; return; }

        let html = `<button ${page <= 1 ? 'disabled' : ''} onclick="loadTransactions(${page - 1})">← Prev</button>`;
        html += `<span class="pagination-info">Page ${page} of ${total}</span>`;
        html += `<button ${page >= total ? 'disabled' : ''} onclick="loadTransactions(${page + 1})">Next →</button>`;
        container.innerHTML = html;
    }

    function getCategoryColor(cat) {
        const colors = {
            'Digital Subscriptions': '#2EAADC', 'Food & Dining': '#D9730D',
            'Transport': '#448361', 'Shopping': '#9B51E0', 'Travel': '#337EA9',
            'Health': '#E16259', 'Health & Fitness': '#E16259',
            'Insurance': '#6940A5', 'Utilities': '#CC8E22',
            'Salary': '#0F7B6C', 'Pension': '#0F7B6C',
            'Entertainment': '#AD1A72', 'Education': '#6C6C6C',
            'Taxes': '#D44C47', 'Cash Deposit': '#0F7B6C',
            'Cash Withdrawal': '#E03E3E', 'Reimbursement': '#448361',
            'Transfer In': '#0F7B6C', 'Other Income': '#0F7B6C',
        };
        return colors[cat] || themeVar('--text-muted', '#787774');
    }

    function selectedUncategorizedIds() {
        return Array.from(document.querySelectorAll('.uncategorized-check:checked')).map(el => el.value);
    }

    function updateSelectAllButtonState() {
        const btn = document.getElementById('selectAllVisibleBtn');
        if (!btn) {
            return;
        }

        const allChecks = Array.from(document.querySelectorAll('.uncategorized-check'));
        const checked = allChecks.filter(el => el.checked).length;
        if (!allChecks.length) {
            btn.textContent = 'Select all visible';
            btn.disabled = true;
            return;
        }

        btn.disabled = false;
        btn.textContent = checked === allChecks.length ? 'Clear selection' : 'Select all visible';
    }

    function toggleSelectAllVisible() {
        const allChecks = Array.from(document.querySelectorAll('.uncategorized-check'));
        if (!allChecks.length) {
            return;
        }

        const shouldSelectAll = allChecks.some(el => !el.checked);
        allChecks.forEach(el => {
            el.checked = shouldSelectAll;
        });
        updateSelectAllButtonState();
    }

    async function applyBulkCategory() {
        const ids = selectedUncategorizedIds();
        const category = document.getElementById('bulkCategorySelect').value;
        if (!ids.length) {
            showToast('Select at least one uncategorized transaction', 'info');
            return;
        }
        if (!category) {
            showToast('Choose a category first', 'error');
            return;
        }

        const res = await fetch('/api/transactions/bulk-category', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids, category }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
            showToast(apiErrorMessage(data, 'Bulk update failed'), 'error');
            return;
        }

        showToast(`Updated ${data.updated} transaction(s)`);
        loadTransactions(currentPage);
    }

    async function applyQuickCategory(txId, selectEl) {
        const category = selectEl.value;
        if (!category) {
            return;
        }

        const res = await fetch(`/api/transactions/${txId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ category }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
            showToast(apiErrorMessage(data, 'Category update failed'), 'error');
            return;
        }

        showToast('Category updated');
        loadTransactions(currentPage);
    }

    function toggleUncategorizedQueue() {
        uncategorizedOnly = !uncategorizedOnly;
        document.getElementById('uncatToggleBtn').textContent = `Inbox zero: ${uncategorizedOnly ? 'ON' : 'OFF'}`;
        document.getElementById('categoryFilter').disabled = uncategorizedOnly;
        loadTransactions(1);
    }

    function editField(el, txId, field) {
        const current = field === 'category'
            ? (el.dataset.category || el.textContent.trim())
            : el.textContent.trim();
        const input = document.createElement('input');
        input.className = 'edit-input';
        input.value = field === 'category'
            ? (window.SpectraCategory?.translate(current) || current)
            : current;
        el.replaceWith(input);
        input.focus();
        input.select();

        async function save() {
            const rawVal = input.value.trim();
            const newVal = field === 'category'
                ? (window.SpectraCategory?.toCanonical(rawVal) || rawVal)
                : rawVal;
            if (newVal && newVal !== current) {
                const body = {};
                body[field] = newVal;
                await fetch(`/api/transactions/${txId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                showToast(`${field === 'category' ? 'Category' : 'Merchant'} updated`);
            }
            loadTransactions(currentPage);
        }

        input.addEventListener('blur', save);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') save();
            if (e.key === 'Escape') loadTransactions(currentPage);
        });
    }

    // Debounced search
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadTransactions(1), 300);
    });
    document.getElementById('categoryFilter').addEventListener('change', () => loadTransactions(1));
    document.getElementById('dateFrom').addEventListener('change', () => loadTransactions(1));
    document.getElementById('dateTo').addEventListener('change', () => loadTransactions(1));

    window.addEventListener('spectra-theme-change', () => {
        loadTransactions(currentPage);
    });

    window.addEventListener('spectra-language-change', async () => {
        await loadCategories();
        loadTransactions(currentPage);
    });

    loadCategories();
    loadTransactions();
</script>
{% endblock %}
