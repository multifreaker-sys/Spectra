{% extends "base.html" %}
{% block title %}Dashboard — Spectra{% endblock %}

{% block content %}
<h1 class="page-title">Dashboard</h1>
<p class="page-subtitle" id="subtitle">Loading...</p>

<div class="cards" id="cards">
    <div class="card">
        <div class="card-label">Total Spent</div>
        <div class="card-value negative" id="totalSpent">—</div>
    </div>
    <div class="card">
        <div class="card-label">Income</div>
        <div class="card-value positive" id="totalIncome">—</div>
    </div>
    <div class="card">
        <div class="card-label">Subscriptions</div>
        <div class="card-value neutral" id="subscriptions">—</div>
    </div>
    <div class="card">
        <div class="card-label">Uncategorized</div>
        <div class="card-value warning" id="uncategorized">—</div>
    </div>
</div>

<div class="charts-row">
    <div class="chart-box">
        <h3>Spending by Category</h3>
        <canvas id="categoryChart" height="260"></canvas>
    </div>
    <div class="chart-box">
        <h3>Monthly Trend</h3>
        <canvas id="monthlyChart" height="260"></canvas>
    </div>
</div>

<div class="charts-row">
    <div class="chart-box">
        <h3>Top Merchants</h3>
        <ul class="merchant-list" id="topMerchants">
            <li class="empty-state">
                <p>Loading...</p>
            </li>
        </ul>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let catChart, monthChart;
    let dashboardData = null;

    function cssVar(name, fallback = '') {
        const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        return value || fallback;
    }

    function getChartTheme() {
        return {
            fontFamily: cssVar('--font', 'Inter, sans-serif'),
            textColor: cssVar('--text', '#37352F'),
            mutedColor: cssVar('--text-muted', '#787774'),
            gridColor: cssVar('--chart-grid', '#F1F1EF'),
            accent: cssVar('--accent', '#2EAADC'),
            palette: [
                cssVar('--accent', '#2EAADC'),
                cssVar('--positive', '#0F7B6C'),
                cssVar('--warning', '#D9730D'),
                cssVar('--negative', '#E03E3E'),
                cssVar('--purple', '#9B51E0'),
                '#6940A5', '#AD1A72', '#E16259', '#CC8E22', '#448361',
                '#337EA9', '#CB912F', '#D44C47', '#6C6C6C',
            ],
        };
    }

    function renderCharts(data) {
        const theme = getChartTheme();

        const catLabels = Object.keys(data.by_category);
        const catValues = Object.values(data.by_category);

        if (catChart) catChart.destroy();
        catChart = new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: catLabels,
                datasets: [{
                    data: catValues,
                    backgroundColor: theme.palette.slice(0, catLabels.length),
                    borderWidth: 0,
                    hoverOffset: 4,
                }],
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            color: theme.mutedColor,
                            font: { family: theme.fontFamily, size: 12 },
                            padding: 12,
                            usePointStyle: true,
                        },
                    },
                },
                cutout: '65%',
            },
        });

        const monthLabels = Object.keys(data.monthly).map(m => {
            const [y, mo] = m.split('-');
            return new Date(y, mo - 1).toLocaleDateString('en', { month: 'short', year: '2-digit' });
        });
        const monthValues = Object.values(data.monthly);

        if (monthChart) monthChart.destroy();
        monthChart = new Chart(document.getElementById('monthlyChart'), {
            type: 'bar',
            data: {
                labels: monthLabels,
                datasets: [{
                    label: 'Spending',
                    data: monthValues,
                    backgroundColor: theme.accent,
                    borderRadius: 6,
                    borderSkipped: false,
                }],
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: theme.mutedColor,
                            font: { family: theme.fontFamily, size: 11 },
                            callback: v => '€' + v.toLocaleString(),
                        },
                        grid: { color: theme.gridColor },
                    },
                    x: {
                        ticks: {
                            color: theme.mutedColor,
                            font: { family: theme.fontFamily, size: 11 },
                        },
                        grid: { display: false },
                    },
                },
            },
        });
    }

    async function loadDashboard() {
        try {
            const res = await fetch('/api/summary');
            const data = await res.json();
            dashboardData = data;

            // Cards
            document.getElementById('totalSpent').textContent = formatCurrency(data.total_spent);
            document.getElementById('totalIncome').textContent = formatCurrency(data.total_income);
            document.getElementById('subscriptions').textContent = formatCurrency(data.subscriptions);
            document.getElementById('uncategorized').textContent = data.uncategorized;

            // Subtitle
            const months = Object.keys(data.monthly);
            if (months.length > 0) {
                const latest = months[months.length - 1];
                const [y, m] = latest.split('-');
                const monthName = new Date(y, m - 1).toLocaleDateString('en', { month: 'long', year: 'numeric' });
                document.getElementById('subtitle').textContent = monthName;
            } else {
                document.getElementById('subtitle').textContent = 'No data yet';
                if (!document.getElementById('dashboardEmptyState')) {
                    document.getElementById('cards').insertAdjacentHTML('afterend',
                        `<div class="empty-state" id="dashboardEmptyState" style="margin:-16px 0 24px;">
                            <div class="icon">📊</div>
                            <h3>Your dashboard is empty</h3>
                            <p>Upload a bank export to see your spending breakdown</p>
                            <a href="/upload" class="btn btn-primary" style="margin-top:16px;">📤 Upload CSV</a>
                        </div>`);
                }
            }

            renderCharts(data);

            // Top merchants
            const merchantList = document.getElementById('topMerchants');
            if (data.top_merchants.length === 0) {
                merchantList.innerHTML = '<li class="empty-state"><p>No data yet</p></li>';
            } else {
                merchantList.innerHTML = data.top_merchants.map((m, i) => `
                <li class="merchant-item">
                    <span class="merchant-rank">${i + 1}</span>
                    <span class="merchant-name">${m.name}</span>
                    <span class="merchant-amount">${formatCurrency(m.total)}</span>
                </li>
            `).join('');
            }
        } catch (err) {
            console.error('Dashboard load error:', err);
            document.getElementById('subtitle').textContent = 'Error loading data';
        }
    }

    window.addEventListener('spectra-theme-change', () => {
        if (dashboardData) {
            renderCharts(dashboardData);
        }
    });

    loadDashboard();
</script>
{% endblock %}
